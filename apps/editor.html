<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Editor de Texto</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:#1a1a2e;color:#eee;padding:1rem;display:flex;flex-direction:column;height:100vh}
.titlebar{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem}
.titlebar h1{color:#e94560;font-size:1.1rem}
.titlebar .file-info{color:#888;font-size:.8rem}
textarea{flex:1;width:100%;background:#0f3460;color:#ddd;border:1px solid #333;border-radius:6px;padding:.8rem;font-family:monospace;font-size:.9rem;resize:none;min-height:100px}
textarea:focus{outline:none;border-color:#e94560}
.toolbar{display:flex;gap:.5rem;margin-top:.6rem;flex-wrap:wrap}
.toolbar input{flex:1;min-width:100px;padding:.5rem;border:1px solid #333;border-radius:6px;background:#0f3460;color:#fff;font-size:.85rem}
.toolbar input::placeholder{color:#888}
.btn{background:#e94560;color:#fff;border:none;border-radius:6px;padding:.5rem 1rem;font-size:.85rem;cursor:pointer}
.btn:hover{background:#c73650}
.btn.secondary{background:#16213e;border:1px solid #333}
.btn.secondary:hover{background:#1f2f52}
.btn.danger{background:#5a2a2a;border:1px solid #e94560}
.btn.danger:hover{background:#7a3a3a}
.file-list{background:#0f3460;border-radius:6px;margin-top:.5rem;max-height:120px;overflow-y:auto;border:1px solid #333;display:none}
.file-list.open{display:block}
.file-item{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.05);font-size:.8rem}
.file-item:hover{background:rgba(233,69,96,.15)}
.file-item .name{flex:1}
.file-item .size{color:#888;font-size:.7rem;margin-left:8px}
.file-item .del{color:#e94560;cursor:pointer;padding:2px 6px;border-radius:4px;font-size:.7rem}
.file-item .del:hover{background:#5a2a2a}
#status{color:#888;font-size:.8rem;margin-top:.5rem;text-align:center}
</style>
</head>
<body>
<div class="titlebar">
<h1>✏️ Editor de Texto</h1>
<span class="file-info" id="fileInfo">Nenhum arquivo aberto</span>
</div>
<div class="toolbar">
<button class="btn secondary" id="listBtn">📂 Listar</button>
<input type="text" id="filename" placeholder="nome-do-arquivo.txt" value="texto.txt">
<button class="btn" id="saveBtn">💾 Salvar</button>
<button class="btn secondary" id="loadBtn">📂 Carregar</button>
<button class="btn danger" id="newBtn">✨ Novo</button>
</div>
<div class="file-list" id="fileList"></div>
<textarea id="editor" placeholder="Digite seu texto aqui..."></textarea>
<div id="status"></div>
<script>
(function(){
var SDK = window.ESPortableSDK;
if (SDK) SDK.setTitle('Editor de Texto');
var currentFile = null;

function api(path){
if(SDK) return SDK.api.get(path);
return fetch(path).then(function(r){return r.json();});
}
function apiPost(path, body){
if(SDK) return SDK.api.post(path, body);
return fetch(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(function(r){return r.json();});
}
function apiDel(path){
if(SDK) return SDK.api.post(path);
return fetch(path,{method:'DELETE'}).then(function(r){return r.json();});
}

function setStatus(msg, err){
document.getElementById('status').textContent=msg;
document.getElementById('status').style.color=err?'#e94560':'#888';
}

function loadList(){
setStatus('Listando...');
api('/api/fs/list?path=/').then(function(data){
var list=document.getElementById('fileList');
list.innerHTML='';
list.classList.add('open');
if(Array.isArray(data)){
var files=data.filter(function(f){return !f.dir;});
if(files.length===0){
list.innerHTML='<div class="file-item"><span class="name" style="color:#888">Nenhum arquivo</span></div>';
}else{
files.forEach(function(f){
var div=document.createElement('div');
div.className='file-item';
var name=f.name;
if(name.startsWith('/'))name=name.substring(1);
div.innerHTML='<span class="name">'+name+'</span><span class="size">'+f.size+' B</span><span class="del" data-file="'+f.name+'">🗑</span>';
div.querySelector('.name').addEventListener('click',function(){
document.getElementById('filename').value=name;
loadFile(f.name);
});
div.querySelector('.del').addEventListener('click',function(e){
e.stopPropagation();
if(confirm('Deletar '+name+'?')){
apiDel('/api/fs/delete?path='+encodeURIComponent(f.name)).then(function(r){
if(r.status==='ok'){setStatus('Deletado: '+name);loadList();}
else setStatus('Erro ao deletar',true);
}).catch(function(e){setStatus('Erro: '+e.message,true);});
}
});
list.appendChild(div);
});
}
}else{
list.innerHTML='<div class="file-item"><span class="name" style="color:#888">Erro ao listar</span></div>';
}
setStatus('');
}).catch(function(e){setStatus('Erro: '+e.message,true);});
}

function loadFile(path){
var name=path;
if(name.startsWith('/'))name=name.substring(1);
document.getElementById('filename').value=name;
setStatus('Carregando...');
api('/api/fs/read?path='+encodeURIComponent(path)).then(function(data){
if(data.content!==undefined){
document.getElementById('editor').value=data.content;
currentFile=path;
document.getElementById('fileInfo').textContent=name+' ('+data.size+' B)';
setStatus('✔ Carregado');
}else{
setStatus('Arquivo vazio',true);
document.getElementById('editor').value='';
}
}).catch(function(e){setStatus('Erro: '+e.message,true);});
}

function saveFile(){
var content=document.getElementById('editor').value;
var name=document.getElementById('filename').value.trim();
if(!name){setStatus('Informe um nome de arquivo',true);return;}
if(!name.startsWith('/'))name='/'+name;
setStatus('Salvando...');
apiPost('/api/fs/write',{path:name,content:content}).then(function(r){
if(r.status==='ok'){
currentFile=name;
document.getElementById('fileInfo').textContent=name.substring(1)+' ('+r.size+' B)';
setStatus('✔ Salvo como '+name.substring(1));
}else setStatus('Erro ao salvar',true);
}).catch(function(e){setStatus('Erro: '+e.message,true);});
}

function newFile(){
document.getElementById('editor').value='';
document.getElementById('filename').value='texto.txt';
currentFile=null;
document.getElementById('fileInfo').textContent='Novo arquivo';
setStatus('');
}

document.getElementById('listBtn').addEventListener('click',loadList);
document.getElementById('saveBtn').addEventListener('click',saveFile);
document.getElementById('loadBtn').addEventListener('click',function(){
var name=document.getElementById('filename').value.trim();
if(!name){setStatus('Informe um nome',true);return;}
if(!name.startsWith('/'))name='/'+name;
loadFile(name);
});
document.getElementById('newBtn').addEventListener('click',newFile);
document.addEventListener('click',function(e){
var list=document.getElementById('fileList');
if(!e.target.closest('.file-list')&&!e.target.closest('#listBtn'))list.classList.remove('open');
});
(SDK?SDK.onReady:function(cb){cb()})(function(){});
})();
</script>
</body>
</html>
