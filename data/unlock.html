<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ESPortable32 - Bloqueado</title>
<style>
body{font-family:sans-serif;background:#1a1a2e;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
.card{background:#16213e;padding:2rem;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.4);max-width:320px;width:90%;text-align:center}
h1{color:#e94560;margin-bottom:1rem}
input{width:100%;padding:.6rem;border:1px solid #333;border-radius:6px;background:#0f3460;color:#fff;font-size:1.5rem;text-align:center;box-sizing:border-box;margin-bottom:1rem}
button{width:100%;padding:.7rem;background:#e94560;color:#fff;border:none;border-radius:6px;font-size:1rem;cursor:pointer}
button:hover{background:#c73650}
.error{color:#e94560;font-size:.9rem;margin-top:.5rem}
</style>
</head>
<body>
<div class="card">
<h1>🔒 Bloqueado</h1>
<p>Digite o PIN para desbloquear</p>
<input type="password" id="pin" placeholder="PIN" maxlength="6" inputmode="numeric" autofocus>
<button id="unlockBtn">Desbloquear</button>
<p id="error" class="error"></p>
</div>
<script>
function unlock(){
const pin=document.getElementById('pin').value;
fetch('/api/unlock',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'pin='+encodeURIComponent(pin)})
.then(r=>{if(r.ok)window.location.href='/';else document.getElementById('error').textContent='PIN incorreto'})
.catch(e=>document.getElementById('error').textContent='Erro de conexão');
}
document.getElementById('pin').addEventListener('keydown',e=>{if(e.key==='Enter')unlock()});
document.getElementById('unlockBtn').addEventListener('click',unlock);
</script>
</body>
</html>
