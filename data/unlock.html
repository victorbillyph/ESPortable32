<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ESPortable32 - Bloqueado</title>
<link rel="stylesheet" href="/css/style.css">
<style>
body{display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
.unlock-card{background:var(--surface2);border-radius:12px;padding:2rem;border:1px solid var(--border);max-width:340px;width:90%;text-align:center}
.unlock-card h1{font-size:1.2rem;margin-bottom:1rem}
.unlock-card input{width:100%;margin-bottom:.8rem}
.unlock-card .btn{width:100%}
.error{color:var(--red);font-size:.85rem;margin-top:.5rem}
</style>
</head>
<body>
<div class="unlock-card">
  <h1>ESPortable32</h1>
  <p style="color:var(--text2);margin-bottom:1rem">Dispositivo bloqueado. Digite o PIN para desbloquear.</p>
  <input type="password" id="pin-input" placeholder="PIN" autocomplete="off" inputmode="numeric" pattern="[0-9]*">
  <button class="btn" id="unlock-btn">Desbloquear</button>
  <div id="unlock-error" class="error"></div>
</div>
<script>
document.getElementById('pin-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('unlock-btn').click();
});
document.getElementById('unlock-btn').onclick = async function() {
  const pin = document.getElementById('pin-input').value.trim();
  if (!pin) return;
  const error = document.getElementById('unlock-error');
  error.textContent = 'Verificando...';
  try {
    const r = await fetch('/api/unlock', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'pin=' + encodeURIComponent(pin)
    });
    const d = await r.json();
    if (d.status === 'ok') {
      window.location.href = '/';
    } else {
      error.textContent = 'PIN incorreto';
      document.getElementById('pin-input').value = '';
    }
  } catch (e) {
    error.textContent = 'Erro de conexao';
  }
};
</script>
</body>
</html>
