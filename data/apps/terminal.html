<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Terminal - ESPortable32</title>
<link rel="stylesheet" href="/css/style.css">
<style>
.container{max-width:700px;margin:0 auto;padding:1rem}
h1{font-size:1.3rem;margin-bottom:1.2rem}
.term-log{background:#000;color:#0f0;font-family:'Courier New',monospace;font-size:.85rem;padding:.8rem;border-radius:6px;height:350px;overflow-y:auto;border:1px solid var(--border);white-space:pre-wrap;word-break:break-all}
.input-row{display:flex;gap:.5rem;margin-top:.5rem}
.input-row input{flex:1;font-family:'Courier New',monospace}
</style>
</head>
<body>
<div class="container">
  <a href="/" class="btn secondary" style="display:inline-block;margin-bottom:1rem">&larr; Voltar</a>
  <h1>Terminal</h1>
  <div class="term-log" id="term-log">Conectando WebSocket...</div>
  <div class="input-row">
    <input type="text" id="term-input" placeholder="STATUS, HELP, WIFI=ssid,pass, SAVE, ...">
    <button class="btn" id="term-send">Enviar</button>
    <button class="btn secondary" id="term-clear">Limpar</button>
  </div>
  <div id="term-msg" class="msg info">Conectando...</div>
</div>
<script src="/js/app.js"></script>
<script>
let ws = null;
const log = $('term-log');

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/ws');
  ws.onopen = () => { log.textContent += '[WebSocket conectado]\n'; msg('term-msg', 'Conectado', 'info'); };
  ws.onclose = () => { log.textContent += '[WebSocket desconectado]\n'; msg('term-msg', 'Desconectado, reconectando...', 'error'); setTimeout(connect, 3000); };
  ws.onmessage = (e) => { log.textContent += e.data + '\n'; log.scrollTop = log.scrollHeight; };
}

connect();

$('term-send').onclick = sendCmd;
$('term-clear').onclick = () => { log.textContent = ''; };
$('term-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendCmd(); });

async function sendCmd() {
  const input = $('term-input');
  const cmd = input.value.trim();
  if (!cmd) return;
  input.value = '';
  log.textContent += '> ' + cmd + '\n';
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(cmd);
  } else {
    try {
      const r = await api('/status?cmd=' + encodeURIComponent(cmd));
      log.textContent += JSON.stringify(r) + '\n';
    } catch (e) {
      log.textContent += '[Erro: ' + e.message + ']\n';
    }
  }
  log.scrollTop = log.scrollHeight;
}
</script>
</body>
</html>
