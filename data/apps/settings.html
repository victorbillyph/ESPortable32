<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Configuracoes - ESPortable32</title>
<link rel="stylesheet" href="/css/style.css">
<style>
.container{max-width:600px;margin:0 auto;padding:1rem}
h1{font-size:1.3rem;margin-bottom:1.2rem}
.card{background:var(--surface2);border-radius:10px;padding:1rem;margin-bottom:1rem;border:1px solid var(--border)}
.card h2{font-size:1rem;font-weight:600;margin-bottom:.8rem;color:var(--text2)}
.form-group{margin-bottom:.8rem}
.form-group label{display:block;font-size:.85rem;color:var(--text2);margin-bottom:.3rem}
input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.5rem .7rem;border-radius:6px;font-size:.9rem;box-sizing:border-box}
input:focus{outline:none;border-color:var(--primary)}
.form-row{display:flex;gap:.8rem}
.form-row .form-group{flex:1}
.btn-row{display:flex;gap:.5rem;flex-wrap:wrap}
</style>
</head>
<body>
<div class="container">
  <a href="/" class="btn secondary" style="display:inline-block;margin-bottom:1rem">&larr; Voltar</a>
  <h1>Configuracoes</h1>

  <div class="card">
    <h2>WiFi</h2>
    <div class="form-row">
      <div class="form-group">
        <label>SSID</label>
        <input type="text" id="set-ssid" placeholder="Nome da rede">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="set-pass" placeholder="Senha WiFi">
      </div>
    </div>
    <button class="btn" id="set-wifi">Salvar WiFi</button>
    <div id="set-wifi-msg" class="msg"></div>
  </div>

  <div class="card">
    <h2>Seguranca</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Novo PIN</label>
        <input type="password" id="set-pin" placeholder="4-8 digitos" inputmode="numeric">
      </div>
      <div class="form-group">
        <label>Nome do dispositivo</label>
        <input type="text" id="set-name" placeholder="ESPortable32">
      </div>
    </div>
    <button class="btn" id="set-security">Salvar</button>
    <div id="set-security-msg" class="msg"></div>
  </div>

  <div class="card">
    <h2>Sistema</h2>
    <div class="btn-row">
      <button class="btn danger" id="set-restart">Reiniciar ESP32</button>
      <button class="btn danger" id="set-reset">Reset de fabrica</button>
    </div>
    <div id="set-sys-msg" class="msg"></div>
  </div>
</div>
<script src="/js/app.js"></script>
<script>
api('/status').then(d => {
  if (d.ssid) $('set-ssid').value = d.ssid;
  if (d.device_name) $('set-name').value = d.device_name;
}).catch(() => {});

$('set-wifi').onclick = async () => {
  const ssid = $('set-ssid').value.trim();
  const pass = $('set-pass').value.trim();
  if (!ssid) return msg('set-wifi-msg', 'SSID obrigatorio', 'error');
  try {
    const r = await fetch('/api/setup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'ssid=' + encodeURIComponent(ssid) + '&pass=' + encodeURIComponent(pass)
    });
    const t = await r.text();
    msg('set-wifi-msg', t === 'OK' ? 'WiFi salvo! Reinicie para aplicar.' : t, t === 'OK' ? 'success' : 'error');
  } catch (e) { msg('set-wifi-msg', 'Erro: ' + e.message, 'error'); }
};

$('set-security').onclick = async () => {
  const pin = $('set-pin').value.trim();
  const name = $('set-name').value.trim();
  let body = '';
  if (pin) body += 'pin=' + encodeURIComponent(pin);
  if (name) body += (body ? '&' : '') + 'name=' + encodeURIComponent(name);
  if (!body) return;
  try {
    const r = await fetch('/api/setup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: body
    });
    const t = await r.text();
    msg('set-security-msg', t === 'OK' ? 'Salvo!' : t, t === 'OK' ? 'success' : 'error');
  } catch (e) { msg('set-security-msg', 'Erro: ' + e.message, 'error'); }
};

$('set-restart').onclick = async () => {
  if (!confirm('Reiniciar ESP32?')) return;
  try {
    await api('/restart', { method: 'POST' });
    msg('set-sys-msg', 'Reiniciando...', 'info');
  } catch (e) { msg('set-sys-msg', 'Erro: ' + e.message, 'error'); }
};

$('set-reset').onclick = async () => {
  if (!confirm('Apagar todas as configuracoes e reiniciar?')) return;
  try {
    await api('/fs/delete?path=/config.json', { method: 'DELETE' });
    msg('set-sys-msg', 'Configuracoes apagadas. Reinicie o ESP32 manualmente.', 'info');
  } catch (e) { msg('set-sys-msg', 'Erro: ' + e.message, 'error'); }
};
</script>
</body>
</html>
