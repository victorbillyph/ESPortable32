<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Loja</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:#1a1a2e;color:#eee;padding:1rem}
h1{color:#e94560;font-size:1.3rem;margin-bottom:.5rem}
.subtitle{color:#888;font-size:.8rem;margin-bottom:1rem}
#search{width:100%;padding:.6rem;border:1px solid #333;border-radius:6px;background:#0f3460;color:#fff;font-size:.9rem;margin-bottom:1rem;box-sizing:border-box}
#search::placeholder{color:#888}
.app{background:#16213e;border-radius:8px;padding:.8rem;margin-bottom:.6rem;display:flex;align-items:center;gap:.8rem;transition:border-color .2s;border:1px solid transparent}
.app:hover{border-color:rgba(233,69,96,.3)}
.app-icon{font-size:2rem;width:2.5rem;text-align:center}
.app-info{flex:1;min-width:0}
.app-name{font-weight:700;font-size:.95rem}
.app-desc{color:#aaa;font-size:.8rem;margin-top:.2rem}
.app-version{color:#555;font-size:.7rem;margin-top:.1rem}
.btn{background:#e94560;color:#fff;border:none;border-radius:6px;padding:.5rem 1rem;font-size:.8rem;cursor:pointer;white-space:nowrap;transition:all .2s}
.btn:hover{background:#c73650}
.btn.installed{background:#2a5a2a;cursor:default}
.btn.loading{background:#888;cursor:wait}
.error{color:#e94560;font-size:.8rem;margin-top:.5rem;text-align:center}
#status{text-align:center;color:#888;font-size:.8rem;padding:.5rem}
.tabs{display:flex;gap:8px;margin-bottom:1rem}
.tab{background:transparent;color:#888;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.85rem}
.tab.active{background:#e94560;color:#fff}
.tab:hover:not(.active){background:rgba(233,69,96,.15)}
</style>
</head>
<body>
<h1>🛒 Loja de Apps</h1>
<p class="subtitle">Apps disponíveis no repositório GitHub</p>
<div class="tabs">
<button class="tab active" data-tab="store">Disponíveis</button>
<button class="tab" data-tab="installed">Instalados</button>
</div>
<input type="text" id="search" placeholder="Buscar apps...">
<div id="list"></div>
<div id="status"></div>
<script>
(function(){
var SDK = window.ESPortableSDK;
if (SDK) SDK.setTitle('Loja');
var MANIFEST_URL = 'https://raw.githubusercontent.com/victorbillyph/ESPortable32/main/apps/manifest.json';
var RAW_BASE = 'https://raw.githubusercontent.com/victorbillyph/ESPortable32/main/apps/';
var storeApps = [];
var installedApps = [];
var currentTab = 'store';
var installing = {};

function api(path){
if(SDK) return SDK.api.get(path);
return fetch(path).then(function(r){return r.json();});
}
function apiPost(path, body){
if(SDK) return SDK.api.post(path, body);
return fetch(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(function(r){return r.json();});
}

function setStatus(msg,err){
document.getElementById('status').textContent=msg;
document.getElementById('status').style.color=err?'#e94560':'#888';
}

function loadInstalled(){
api('/api/apps').then(function(data){
installedApps=(data&&data.apps)||[];
render();
}).catch(function(){installedApps=[];render();});
}

function fetchManifest(){
setStatus('Buscando apps do repositório...');
fetch(MANIFEST_URL).then(function(r){
if(!r.ok)throw new Error('HTTP '+r.status);
return r.json();
}).then(function(data){
storeApps=(data&&data.apps)||[];
setStatus('✔ '+storeApps.length+' apps encontrados');
render();
}).catch(function(e){
setStatus('Erro ao buscar apps: '+e.message,true);
storeApps=[];
render();
});
}

function installApp(app){
if(installing[app.id])return;
installing[app.id]=true;
render();
setStatus('Instalando '+app.name+'...');
var url=RAW_BASE+app.file;
fetch(url).then(function(r){
if(!r.ok)throw new Error('HTTP '+r.status);
return r.text();
}).then(function(html){
var path='/apps/'+app.file;
return apiPost('/api/fs/write',{path:path,content:html});
}).then(function(r){
if(r.status==='ok'){
setStatus('✔ '+app.name+' instalado!');
installedApps.push({id:app.id,path:'/apps/'+app.file,size:r.size});
installing[app.id]=false;
render();
}else{
setStatus('Erro ao instalar '+app.name,true);
installing[app.id]=false;
render();
}
}).catch(function(e){
setStatus('Erro ao baixar '+app.name+': '+e.message,true);
installing[app.id]=false;
render();
});
}

function uninstallApp(app){
if(!confirm('Remover '+app.name+'?'))return;
setStatus('Removendo '+app.name+'...');
apiPost('/api/fs/write',{path:'/apps/'+app.file,content:''}).then(function(){
setStatus('✔ '+app.name+' removido!');
installedApps=installedApps.filter(function(a){return a.id!==app.id;});
render();
}).catch(function(e){setStatus('Erro: '+e.message,true);});
}

function render(){
var q=(document.getElementById('search').value||'').toLowerCase();
var list=document.getElementById('list');
list.innerHTML='';
var items=[];
if(currentTab==='store') items=storeApps.filter(function(a){
return a.name.toLowerCase().includes(q)||a.desc.toLowerCase().includes(q);
});
else items=installedApps.filter(function(a){
return a.name.toLowerCase().includes(q);
});
items.forEach(function(a){
var appId=a.id||a;
var appName=a.name||(typeof a==='string'?a:a.id);
var appDesc=a.desc||'';
var appIcon=a.icon||'📦';
var appVersion=a.version||'1.0.0';
var appFile=a.file||(a.id+'.html');
var isInstalled=installedApps.some(function(x){return x.id===appId;});
var isInstalling=installing[appId];
var div=document.createElement('div');
div.className='app';
var btnText,btnClass,btnAction;
if(currentTab==='store'){
if(isInstalling){btnText='⏳ Instalando...';btnClass='btn loading';btnAction=null;}
else if(isInstalled){btnText='✔ Instalado';btnClass='btn installed';btnAction=null;}
else{btnText='Instalar';btnClass='btn';btnAction=function(){installApp(a);};}
}else{
btnText='🗑 Remover';btnClass='btn danger';btnAction=function(){uninstallApp(a);};
}
var btnHtml='';
if(btnAction){
btnHtml='<button class="'+btnClass+'" id="btn-'+appId+'">'+btnText+'</button>';
}else{
btnHtml='<button class="'+btnClass+'" disabled>'+btnText+'</button>';
}
div.innerHTML=
'<div class="app-icon">'+appIcon+'</div>'+
'<div class="app-info"><div class="app-name">'+appName+'</div><div class="app-desc">'+appDesc+'</div><div class="app-version">v'+appVersion+'</div></div>'+
btnHtml;
if(btnAction){
div.querySelector('button').addEventListener('click',function(e){
e.preventDefault();
btnAction();
});
}
list.appendChild(div);
});
if(!items.length) list.innerHTML='<div class="error">Nenhum app encontrado</div>';
}

document.getElementById('search').addEventListener('input',render);
document.querySelectorAll('.tab').forEach(function(tab){
tab.addEventListener('click',function(){
document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
tab.classList.add('active');
currentTab=tab.dataset.tab;
render();
});
});
(SDK?SDK.onReady:function(cb){cb()})(function(){
loadInstalled();
fetchManifest();
});
})();
</script>
</body>
</html>
