<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GPIO - ESPortable32</title>
<link rel="stylesheet" href="/css/style.css">
<style>
.container{max-width:700px;margin:0 auto;padding:1rem}
h1{font-size:1.3rem;margin-bottom:1.2rem}
.gpio-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:.5rem}
.gpio-btn{padding:.6rem;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text2);cursor:pointer;text-align:center;transition:all .15s;font-size:.85rem}
.gpio-btn:hover{border-color:var(--primary)}
.gpio-btn.on{background:rgba(46,204,113,.15);border-color:#2ecc71;color:#2ecc71}
.gpio-btn.off{background:rgba(231,76,60,.1);border-color:#e74c3c;color:#e74c3c}
</style>
</head>
<body>
<div class="container">
  <a href="/" class="btn secondary" style="display:inline-block;margin-bottom:1rem">&larr; Voltar</a>
  <h1>GPIO Control</h1>
  <div class="gpio-grid" id="gpio-grid"></div>
  <div id="gpio-msg" class="msg"></div>
</div>
<script src="/js/app.js"></script>
<script>
async function refresh() {
  try {
    const list = await api('/gpio');
    if (!Array.isArray(list)) return;
    $('gpio-grid').innerHTML = list.map(p =>
      `<button class="gpio-btn ${p.state ? 'on' : 'off'}" data-pin="${p.pin}">GPIO ${p.pin}<br>${p.state ? 'ON' : 'OFF'}</button>`
    ).join('');
    $('gpio-grid').querySelectorAll('.gpio-btn').forEach(b => {
      b.onclick = async () => {
        const pin = parseInt(b.dataset.pin);
        const ns = b.classList.contains('on') ? 0 : 1;
        try {
          await api('/gpio', { method: 'POST', body: JSON.stringify({ pin, state: ns }) });
          refresh();
          msg('gpio-msg', `GPIO ${pin} → ${ns ? 'LIGADO' : 'DESLIGADO'}`, 'success');
        } catch (e) { msg('gpio-msg', `Erro: ${e.message}`, 'error'); }
      };
    });
  } catch (e) { msg('gpio-msg', 'Erro ao carregar', 'error'); }
}
refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
