<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Arquivos - ESPortable32</title>
<link rel="stylesheet" href="/css/style.css">
<style>
.container{max-width:800px;margin:0 auto;padding:1rem}
h1{font-size:1.3rem;margin-bottom:1.2rem}
.toolbar{display:flex;gap:.5rem;margin-bottom:.8rem;flex-wrap:wrap}
input[type="text"]{flex:1;min-width:120px;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.5rem .7rem;border-radius:6px;font-size:.9rem}
input:focus{outline:none;border-color:var(--primary)}
.file-list{list-style:none;max-height:300px;overflow-y:auto;border:1px solid var(--border);border-radius:6px}
.file-list li{padding:.5rem .7rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.file-list li:last-child{border-bottom:none}
.file-list li:hover{background:rgba(255,255,255,.04)}
.file-list li.selected{background:rgba(233,69,96,.1)}
textarea{width:100%;min-height:200px;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.7rem;border-radius:6px;font-family:'Courier New',monospace;font-size:.85rem;resize:vertical}
textarea:focus{outline:none;border-color:var(--primary)}
.layout{display:flex;gap:1rem;flex-wrap:wrap}
.layout .side{flex:1;min-width:200px}
.layout .main{flex:2;min-width:300px}
</style>
</head>
<body>
<div class="container">
  <a href="/" class="btn secondary" style="display:inline-block;margin-bottom:1rem">&larr; Voltar</a>
  <h1>Arquivos</h1>
  <div class="toolbar">
    <input type="text" id="file-path" placeholder="/index.html">
    <button class="btn small" id="file-load">Carregar</button>
    <button class="btn small" id="file-save">Salvar</button>
    <button class="btn danger small" id="file-delete">Deletar</button>
    <button class="btn secondary small" id="file-refresh">Atualizar</button>
  </div>
  <div class="layout">
    <div class="side">
      <ul class="file-list" id="file-list"></ul>
    </div>
    <div class="main">
      <textarea id="file-content" placeholder="Conteudo do arquivo..."></textarea>
    </div>
  </div>
  <div id="file-msg" class="msg"></div>
</div>
<script src="/js/app.js"></script>
<script>
let curPath = '';

$('file-load').onclick = loadFile;
$('file-save').onclick = saveFile;
$('file-delete').onclick = deleteFile;
$('file-refresh').onclick = refreshList;
$('file-path').addEventListener('keydown', e => { if (e.key === 'Enter') loadFile(); });

refreshList();

async function refreshList() {
  try {
    const list = await api('/fs/list?path=/');
    if (!Array.isArray(list)) return;
    $('file-list').innerHTML = list.filter(f => !f.dir).map(f => {
      const name = f.name.replace(/^\//, '');
      return `<li data-path="${f.name}"><span class="file-name">${name}</span><span class="file-size">${fmtBytes(f.size)}</span></li>`;
    }).join('');
    $('file-list').querySelectorAll('li').forEach(li => {
      li.onclick = () => {
        $('file-list').querySelectorAll('li').forEach(l => l.classList.remove('selected'));
        li.classList.add('selected');
        curPath = li.dataset.path;
        $('file-path').value = curPath;
        loadFile();
      };
    });
  } catch (e) { msg('file-msg', 'Erro ao listar', 'error'); }
}

async function loadFile() {
  const path = $('file-path').value.trim();
  if (!path) return;
  try {
    const d = await api('/fs/read?path=' + encodeURIComponent(path));
    if (d.content !== undefined) {
      $('file-content').value = d.content;
      curPath = path;
      msg('file-msg', `Carregado: ${path}`, 'info');
    }
  } catch (e) { msg('file-msg', 'Erro: ' + e.message, 'error'); }
}

async function saveFile() {
  const path = $('file-path').value.trim();
  const content = $('file-content').value;
  if (!path) return;
  try {
    await api('/fs/write', { method: 'POST', body: JSON.stringify({ path, content }) });
    msg('file-msg', `Salvo: ${path}`, 'success');
    refreshList();
  } catch (e) { msg('file-msg', 'Erro: ' + e.message, 'error'); }
}

async function deleteFile() {
  const path = $('file-path').value.trim();
  if (!path || !confirm(`Deletar ${path}?`)) return;
  try {
    await api('/fs/delete?path=' + encodeURIComponent(path), { method: 'DELETE' });
    msg('file-msg', `Deletado: ${path}`, 'info');
    $('file-content').value = '';
    curPath = '';
    $('file-path').value = '';
    refreshList();
  } catch (e) { msg('file-msg', 'Erro: ' + e.message, 'error'); }
}
</script>
</body>
</html>
