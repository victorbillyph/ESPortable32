<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Proxy HTTP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:#1a1a2e;color:#eee;padding:1rem;display:flex;flex-direction:column;height:100vh}
.titlebar{display:flex;align-items:center;margin-bottom:.8rem}
.titlebar h1{color:#e94560;font-size:1.1rem}
.url-bar{display:flex;gap:.5rem;margin-bottom:.8rem}
.url-bar input{flex:1;padding:.6rem;border:1px solid #333;border-radius:6px;background:#0f3460;color:#fff;font-size:.85rem}
.url-bar input::placeholder{color:#888}
.url-bar input:focus{outline:none;border-color:#e94560}
.btn{background:#e94560;color:#fff;border:none;border-radius:6px;padding:.5rem 1rem;font-size:.85rem;cursor:pointer;white-space:nowrap}
.btn:hover{background:#c73650}
.btn.secondary{background:#16213e;border:1px solid #333}
.btn.secondary:hover{background:#1f2f52}
#response{margin-top:.5rem;flex:1;display:flex;flex-direction:column}
#response label{color:#888;font-size:.8rem;margin-bottom:.3rem}
#response pre{flex:1;background:#0f3460;color:#ddd;border:1px solid #333;border-radius:6px;padding:.8rem;font-family:monospace;font-size:.8rem;overflow:auto;white-space:pre-wrap;word-break:break-all}
#status{color:#888;font-size:.8rem;margin-top:.5rem;text-align:center}
</style>
</head>
<body>
<div class="titlebar">
<h1>🌐 Proxy HTTP</h1>
</div>
<div class="url-bar">
<input type="text" id="urlInput" placeholder="http://exemplo.com/recurso">
<button class="btn" id="fetchBtn">🔍 Buscar</button>
<button class="btn secondary" id="clearBtn">Limpar</button>
</div>
<div id="response">
<label>Resposta:</label>
<pre id="output">Clique em "Buscar" para fazer uma requisição...</pre>
</div>
<div id="status"></div>
<script>
(function(){
  var SDK = window.ESPortableSDK;
  if (SDK) SDK.setTitle('Proxy HTTP');

  function setStatus(msg, err){
    var el = document.getElementById('status');
    el.textContent = msg;
    el.style.color = err ? '#e94560' : '#888';
  }

  function fetchURL(){
    var url = document.getElementById('urlInput').value.trim();
    if (!url) { setStatus('Informe uma URL', true); return; }
    if (!url.startsWith('http://') && !url.startsWith('https://')) {
      url = 'http://' + url;
      document.getElementById('urlInput').value = url;
    }
    document.getElementById('output').textContent = 'Carregando...';
    setStatus('');
    if (SDK) {
      SDK.api.post('/api/proxy', {url:url}).then(function(data){
        document.getElementById('output').textContent = data.content || JSON.stringify(data, null, 2);
        setStatus('✔ OK');
      }).catch(function(e){ 
        document.getElementById('output').textContent = 'Erro: ' + e.message;
        setStatus('Falha na requisição', true);
      });
    } else {
      fetch('/api/proxy', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({url:url})})
      .then(function(r){ return r.json(); })
      .then(function(data){
        document.getElementById('output').textContent = data.content || JSON.stringify(data, null, 2);
        setStatus('✔ OK');
      })
      .catch(function(e){
        document.getElementById('output').textContent = 'Erro: ' + e.message;
        setStatus('Falha na requisição', true);
      });
    }
  }

  function clearOutput(){
    document.getElementById('output').textContent = '';
    setStatus('');
  }

  document.getElementById('fetchBtn').addEventListener('click', fetchURL);
  document.getElementById('clearBtn').addEventListener('click', clearOutput);
  document.getElementById('urlInput').addEventListener('keydown', function(e){
    if (e.key === 'Enter') fetchURL();
  });

  (SDK ? SDK.onReady : function(cb){cb()})(function(){});
})();
</script>
</body>
</html>
