<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ESPortable32</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div class="logo">ESPortable32</div>
    <div class="nav-items" id="nav-items"></div>
    <div class="nav-footer" id="status-bar">
      <span class="status-dot" id="indicator"></span>
      <span id="status-text">Carregando...</span>
    </div>
  </div>
  <div id="content">
    <iframe id="app-frame" src=""></iframe>
  </div>
</div>
<script src="/js/app.js"></script>
<script>
const API = '/api';
let apps = [];
let currentApp = null;

function setStatus(dot, txt) {
  document.getElementById('indicator').className = 'status-dot ' + dot;
  document.getElementById('status-text').textContent = txt;
}

function renderSidebar() {
  const nav = document.getElementById('nav-items');
  const system = apps.filter(a => a.type === 'system');
  const user = apps.filter(a => a.type !== 'system');
  let html = '';

  html += '<div style="padding:.3rem 1rem .2rem;font-size:.7rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px">Sistema</div>';
  system.forEach(a => {
    html += `<a href="#" class="nav-item${currentApp === a.id ? ' active' : ''}" data-id="${a.id}" data-path="/apps/${a.id}.html">
      <span class="nav-icon">${a.icon || '&#9733;'}</span>
      <span>${a.name || a.id}</span>
    </a>`;
  });

  if (user.length) {
    html += '<div style="padding:.3rem 1rem .2rem;font-size:.7rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-top:.5rem">Apps</div>';
    user.forEach(a => {
      html += `<a href="#" class="nav-item${currentApp === a.id ? ' active' : ''}" data-id="${a.id}" data-path="/apps/${a.id}.html">
        <span class="nav-icon">${a.icon || '&#9733;'}</span>
        <span>${a.name || a.id}</span>
      </a>`;
    });
  }

  nav.innerHTML = html;

  nav.querySelectorAll('.nav-item').forEach(el => {
    el.onclick = e => {
      e.preventDefault();
      const id = el.dataset.id;
      const path = el.dataset.path;
      openApp(id, path);
    };
  });
}

function openApp(id, path) {
  currentApp = id;
  document.getElementById('app-frame').src = path;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });
}

async function loadApps() {
  try {
    const data = await api('/apps');
    apps = data.apps || [];
    renderSidebar();
    if (apps.length && !currentApp) {
      openApp(apps[0].id, '/apps/' + apps[0].id + '.html');
    }
  } catch (e) {
    document.getElementById('nav-items').innerHTML = '<div style="padding:1rem;color:var(--text2);font-size:.85rem">Erro ao carregar apps</div>';
  }
}

async function updateStatus() {
  try {
    const st = await api('/status');
    setStatus(st.state < 4 ? 'yellow' : 'green', st.state_name || 'Conectado');
  } catch (e) {
    setStatus('red', 'Offline');
  }
}

document.addEventListener('DOMContentLoaded', () => {
  updateStatus();
  loadApps();
  setInterval(updateStatus, 10000);
});
</script>
</body>
</html>
